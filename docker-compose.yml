services:
  # ─── MariaDB Database ────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: selleragent-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./seller-backend/mariadb/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - selleragent-network

  # ─── Drupal 11 Backend ───────────────────────────────────
  drupal:
    build:
      context: ./seller-backend
      dockerfile: Dockerfile
    container_name: selleragent-drupal
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DRUPAL_DB_HOST: ${DRUPAL_DB_HOST}
      DRUPAL_DB_PORT: ${DRUPAL_DB_PORT}
      DRUPAL_DB_NAME: ${DRUPAL_DB_NAME}
      DRUPAL_DB_USER: ${DRUPAL_DB_USER}
      DRUPAL_DB_PASSWORD: ${DRUPAL_DB_PASSWORD}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
      DRUPAL_ENV: ${DRUPAL_ENV}
    volumes:
      - drupal_files:/docker/sellerbuddy/seller-backend/drupal/web/sites/default/files
      - ./seller-backend/drupal/web/modules/custom:/docker/sellerbuddy/seller-backend/drupal/web/modules/custom
      - ./seller-backend/drupal/web/themes/custom:/docker/sellerbuddy/seller-backend/drupal/web/themes/custom
      - ./seller-backend/config/settings.php:/docker/sellerbuddy/seller-backend/drupal/web/sites/default/settings.php
      - ./seller-backend/config/services.yml:/docker/sellerbuddy/seller-backend/drupal/web/sites/default/services.yml
      - ./seller-backend/drupal/config:/docker/sellerbuddy/seller-backend/drupal/config
    ports:
      - "8080:80"
    networks:
      - selleragent-network

  # ─── React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./seller-frontend
      dockerfile: Dockerfile
    container_name: selleragent-frontend
    restart: unless-stopped
    depends_on:
      - drupal
    volumes:
      - ./seller-frontend/src:/docker/sellerbuddy/seller-frontend/src
      - ./seller-frontend/public:/docker/sellerbuddy/seller-frontend/public
      - ${PWD}/seller-frontend/index.html:/docker/sellerbuddy/seller-frontend/index.html
      - ${PWD}/seller-frontend/vite.config.ts:/docker/sellerbuddy/seller-frontend/vite.config.ts
    ports:
      - "3000:3000"
    networks:
      - selleragent-network

  # ─── SEO Agent (Python/FastAPI) ──────────────────────────
  seo-agent:
    build:
      context: ./ai-agents/seo-agent
      dockerfile: Dockerfile
    container_name: selleragent-seo
    restart: unless-stopped
    depends_on:
      - drupal
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4-turbo-preview}
      OPENAI_FAST_MODEL: ${OPENAI_FAST_MODEL:-gpt-3.5-turbo}
      GSC_SERVICE_ACCOUNT_JSON: /app/credentials/sellerbuddy-gsc.json
      DRUPAL_BASE_URL: ${DRUPAL_BASE_URL:-http://drupal:80}
      DRUPAL_USERNAME: ${DRUPAL_USERNAME:-admin}
      DRUPAL_PASSWORD: ${DRUPAL_PASSWORD:-admin}
    volumes:
      - ./credentials:/app/credentials:ro
      - ./ai-agents/seo-agent/src:/app/src
    ports:
      - "8001:8001"
    networks:
      - selleragent-network

  # ─── Content Writer Agent (Python/FastAPI) ─────────────
  content-writer-agent:
    build:
      context: ./ai-agents/content-writer-agent
      dockerfile: Dockerfile
    container_name: selleragent-content-writer
    restart: unless-stopped
    depends_on:
      - drupal
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4-turbo-preview}
      OPENAI_FAST_MODEL: ${OPENAI_FAST_MODEL:-gpt-3.5-turbo}
      DRUPAL_BASE_URL: ${DRUPAL_BASE_URL:-http://drupal:80}
      DRUPAL_USERNAME: ${DRUPAL_USERNAME:-admin}
      DRUPAL_PASSWORD: ${DRUPAL_PASSWORD:-admin}
    volumes:
      - ./ai-agents/content-writer-agent/src:/app/src
    ports:
      - "8002:8002"
    networks:
      - selleragent-network

volumes:
  mariadb_data:
    driver: local
  drupal_files:
    driver: local

networks:
  selleragent-network:
    driver: bridge
