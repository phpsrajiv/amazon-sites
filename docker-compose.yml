services:
  # ─── MariaDB Database ────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: selleragent-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./seller-backend/mariadb/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - selleragent-network

  # ─── Drupal 11 Backend ───────────────────────────────────
  drupal:
    build:
      context: ./seller-backend
      dockerfile: Dockerfile
    container_name: selleragent-drupal
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DRUPAL_DB_HOST: ${DRUPAL_DB_HOST}
      DRUPAL_DB_PORT: ${DRUPAL_DB_PORT}
      DRUPAL_DB_NAME: ${DRUPAL_DB_NAME}
      DRUPAL_DB_USER: ${DRUPAL_DB_USER}
      DRUPAL_DB_PASSWORD: ${DRUPAL_DB_PASSWORD}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
      DRUPAL_ENV: ${DRUPAL_ENV}
    volumes:
      - drupal_files:/opt/drupal/web/sites/default/files
      - ./seller-backend/drupal/web/modules/custom:/opt/drupal/web/modules/custom
      - ./seller-backend/drupal/web/themes/custom:/opt/drupal/web/themes/custom
      - ./seller-backend/config/settings.php:/opt/drupal/web/sites/default/settings.php
      - ./seller-backend/config/services.yml:/opt/drupal/web/sites/default/services.yml
    ports:
      - "8080:80"
    networks:
      - selleragent-network

  # ─── React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./seller-frontend
      dockerfile: Dockerfile
    container_name: selleragent-frontend
    restart: unless-stopped
    depends_on:
      - drupal
    volumes:
      - ./seller-frontend/src:/app/src
      - ./seller-frontend/public:/app/public
      - ./seller-frontend/index.html:/app/index.html
      - ./seller-frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "3000:3000"
    networks:
      - selleragent-network

volumes:
  mariadb_data:
    driver: local
  drupal_files:
    driver: local

networks:
  selleragent-network:
    driver: bridge
